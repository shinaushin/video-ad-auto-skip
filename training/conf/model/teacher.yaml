# @package _global_.model
# Teacher model architecture — matches phase3_teacher.json best_params.
# These values were found by Optuna (tune.py / submit_tune.sh).

lstm_hidden:     384    # BiLSTM hidden size per direction (output = 2×)
lstm_layers:     3      # Number of stacked BiLSTM layers
dropout:         0.25   # Dropout in classifier head
embed_mode:      both   # both | text_only | audio_only
arch_variant:    v1     # v1 (single cross-attn) | v2 (stacked) | v3 (FFN blocks)
pos_weight_mult: 1.87   # BCEWithLogitsLoss pos_weight multiplier
